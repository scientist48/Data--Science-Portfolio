<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talha Talib | Data Portfolio</title>

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #f1f5f9;
}

/* Navbar */
nav {
    position: sticky;
    top: 0;
    background: rgba(30,41,59,0.7);
    backdrop-filter: blur(10px);
    padding: 15px;
    text-align: center;
}

nav a {
    margin: 0 15px;
    color: #f1f5f9;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover { color: #38bdf8; }

/* Header */
header {
    text-align: center;
    padding: 100px 20px;
}

.typing {
    font-size: 20px;
    color: #38bdf8;
}

/* Sections */
section {
    padding: 60px 20px;
    max-width: 1100px;
    margin: auto;
}

h2 { color: #38bdf8; }

/* Cards */
.card {
    background: rgba(30,41,59,0.6);
    backdrop-filter: blur(12px);
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* Images */
img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
}

/* Zoom Modal */
#modal {
    display: none;
    position: fixed;
    z-index: 9999;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
}

#modal img {
    margin: auto;
    display: block;
    width: 80%;
}

/* Button */
.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 15px;
    background: #38bdf8;
    color: black;
    border-radius: 6px;
    text-decoration: none;
}

/* Animation */
.fade {
    opacity: 0;
    transform: translateY(20px);
    transition: 1s;
}

.show {
    opacity: 1;
    transform: translateY(0);
}

footer {
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#certificates">Certificates</a>
<a href="#dashboards">Dashboards</a>
<a href="#ml">Projects</a>
<a href="#github">GitHub</a>
</nav>

</div>

</div>
</section>

<!-- DASHBOARDS -->

<div class="grid">

</section>

<footer>© Talha Talib</footer>

<!-- IMAGE ZOOM -->
<div id="modal" onclick="this.style.display='none'">
<img id="modal-img">
</div>

<script>
// Typing effect
let text = "Data Analyst | Power BI | SQL | Machine Learning";
let i = 0;
function type() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type, 50);
    }
}
type();

// Fade in
window.addEventListener("scroll", () => {
    document.querySelectorAll(".fade").forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 50) {
            el.classList.add("show");
        }
    });
});

// Image zoom
function zoom(img) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("modal-img").src = img.src;
}
</script>

</body>
</html>
